name: Tag → prerelease → TestPyPI

# When a vX.Y.Z tag is pushed:
#   1. Validate it against a strict PEP 440 subset
#   2. Create a GitHub prerelease
#   3. Build the package and publish to TestPyPI
#
# To publish to real PyPI, go to the Releases page and mark the prerelease as a
# full release — this fires the `released` event picked up by pypi-publish.yml.
#
# The tag filter is a two-layer check:
#   1. Glob (GitHub): requires vN.N.N* shape, rejecting tags like `vabc` or `v1`
#   2. Regex (job step): enforces a strict subset of PEP 440 (vN.N.N with
#      optional pre/post/dev) before anything is created
on:
  push:
    tags:
      - 'v[0-9]*.[0-9]*.[0-9]*'

jobs:
  # ── Validate the tag ────────────────────────────────────────────────────────
  validate-tag:
    name: Validate tag
    runs-on: ubuntu-latest
    steps:
      - name: Validate tag is a PEP 440 version
        run: |
          python3 -c "
          import re, sys
          tag = '${{ github.ref_name }}'
          version = tag.lstrip('v')
          pattern = r'^(0|[1-9][0-9]*)(\.(0|[1-9][0-9]*)){2}((a|b|rc)(0|[1-9][0-9]*))?(\.(post|dev)(0|[1-9][0-9]*))*$'
          if not re.fullmatch(pattern, version):
              print(f'ERROR: {tag!r} is not a valid PEP 440 version tag')
              sys.exit(1)
          print(f'{tag!r} is a valid PEP 440 version tag')
          "

  # ── Create the GitHub prerelease ────────────────────────────────────────────
  create-prerelease:
    name: Create GitHub prerelease
    needs: validate-tag
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Create prerelease from tag
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: |
          gh release create "${{ github.ref_name }}" \
            --repo "${{ github.repository }}" \
            --prerelease \
            --generate-notes \
            --title "${{ github.ref_name }}"

  # ── Build the sdist + wheel ─────────────────────────────────────────────────
  build:
    name: Build distribution
    needs: validate-tag
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0  # full history needed for poetry-dynamic-versioning

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Install build frontend
        run: python3 -m pip install build poetry-dynamic-versioning --user

      - name: Build wheel and source tarball
        run: python3 -m build --no-isolation

      - name: Upload built distributions as artifact
        uses: actions/upload-artifact@v4
        with:
          name: python-package-distributions
          path: dist/

  # ── Publish to TestPyPI ─────────────────────────────────────────────────────
  publish-to-testpypi:
    name: Publish to TestPyPI
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: testpypi
      url: https://test.pypi.org/p/snakemake-executor-plugin-htcondor
    permissions:
      id-token: write  # required for OIDC trusted publishing
    steps:
      - name: Download built distributions
        uses: actions/download-artifact@v4
        with:
          name: python-package-distributions
          path: dist/

      - name: Publish to TestPyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          repository-url: https://test.pypi.org/legacy/
