# This env.yaml file is used to create the conda/mamba environment that
# gets installed on the Access Point (AP) to run Snakemake with the HTCondor
# executor plugin.
name: snakemake-env
channels:
  - conda-forge
  - bioconda
dependencies:
  - snakemake==9.6.2
  - pip
  - pip:
     - git+https://github.com/htcondor/snakemake-executor-plugin-htcondor.git
